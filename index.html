<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you like me?</title>
    <meta name="description" content="A cute question to ask someone if they like you.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="container">
        <div class="card" id="card">
            <h1>I want to see your beautiful eyes! Can I? 🥺</h1>
            <div class="buttons">
                <button id="yesBtn" class="btn btn-yes">Yes</button>
                <button id="noBtn" class="btn btn-no">No</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
